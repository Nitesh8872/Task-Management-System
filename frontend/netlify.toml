[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA — React Router client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set in Netlify UI → Site settings → Environment variables (required for custom backends):
#   VITE_API_URL = https://task-management-system-production-0d38.up.railway.app
# Must use https:// and the server ROOT (no /api/users). Rebuild after changing.
